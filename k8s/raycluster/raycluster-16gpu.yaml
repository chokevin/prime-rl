# RayCluster shape for a 16-GPU Prime-RL run.
#
# Two GPU worker pods, each with 8 GPUs. Matches the natural 8 train + 8 infer split
# (one worker hosts the Ray Train workers, the other hosts the Prime-vLLM inference
# task) and keeps both NCCL and TP intra-node.
#
# Edit before applying:
#   - metadata.namespace                     -> your namespace
#   - rayVersion                             -> Ray version baked into your image
#   - headGroupSpec.template ...
#       containers[0].image                  -> your Prime-RL Ray image
#       nodeSelector / tolerations           -> your CPU pool selectors
#   - workerGroupSpecs[0] ...
#       replicas / minReplicas / maxReplicas -> total GPU worker pods (here 2)
#       containers[0].image                  -> same image as head
#       nodeSelector                         -> your GPU pool selectors
#       resources.limits["nvidia.com/gpu"]   -> 8 (must match num-gpus)
#   - volumes[].persistentVolumeClaim.claimName
#                                            -> your RWX PVC bound at /shared
#
# Apply with:
#   kubectl apply -f k8s/raycluster/raycluster-16gpu.yaml
#
# Pair with `rl-16gpu-example.toml`, which sets num_train_gpus=8 and num_infer_gpus=8.
apiVersion: ray.io/v1
kind: RayCluster
metadata:
  name: prime-rl-raycluster-16gpu
  namespace: prime-rl
  labels:
    app.kubernetes.io/name: prime-rl
    app.kubernetes.io/component: raycluster
spec:
  rayVersion: "2.40.0"

  headGroupSpec:
    rayStartParams:
      dashboard-host: "0.0.0.0"
      num-cpus: "2"
      num-gpus: "0"
    template:
      metadata:
        labels:
          app.kubernetes.io/name: prime-rl
          app.kubernetes.io/component: raycluster
          ray.io/group: head
      spec:
        # nodeSelector: choose your CPU pool. The head does not need GPUs.
        # nodeSelector:
        #   workload: cpu
        containers:
          - name: ray-head
            image: rayproject/ray:2.40.0-py312
            imagePullPolicy: IfNotPresent
            ports:
              - { containerPort: 6379, name: gcs,       protocol: TCP }
              - { containerPort: 8265, name: dashboard, protocol: TCP }
              - { containerPort: 10001, name: client,   protocol: TCP }
            resources:
              requests: { cpu: "2", memory: "8Gi" }
              limits:   { cpu: "4", memory: "16Gi" }
            volumeMounts:
              - { name: shared,     mountPath: /shared }
              - { name: shared-mem, mountPath: /dev/shm }
        volumes:
          - name: shared
            persistentVolumeClaim:
              claimName: prime-rl-shared
          - name: shared-mem
            emptyDir: { medium: Memory, sizeLimit: "8Gi" }

  workerGroupSpecs:
    - groupName: gpu-workers
      replicas: 2
      minReplicas: 2
      maxReplicas: 2
      rayStartParams:
        # num-gpus must match the GPU resource the container actually requests.
        # Eight GPUs per worker so an 8-way TP/FSDP role fits on one pod.
        num-cpus: "32"
        num-gpus: "8"
      template:
        metadata:
          labels:
            app.kubernetes.io/name: prime-rl
            app.kubernetes.io/component: raycluster
            ray.io/group: gpu-workers
        spec:
          # nodeSelector: choose your GPU pool.
          # nodeSelector:
          #   accelerator: a100
          # tolerations:
          #   - key: nvidia.com/gpu
          #     operator: Exists
          #     effect: NoSchedule
          # One worker per node so trainer and inference do not share a node and
          # the Ray placement strategy "SPREAD" can put them on distinct hosts.
          affinity:
            podAntiAffinity:
              requiredDuringSchedulingIgnoredDuringExecution:
                - labelSelector:
                    matchLabels:
                      app.kubernetes.io/name: prime-rl
                      ray.io/group: gpu-workers
                  topologyKey: kubernetes.io/hostname
          containers:
            - name: ray-worker
              image: rayproject/ray:2.40.0-py312
              imagePullPolicy: IfNotPresent
              resources:
                requests: { cpu: "32", memory: "256Gi" }
                limits:
                  cpu: "64"
                  memory: "512Gi"
                  nvidia.com/gpu: "8"
              volumeMounts:
                - { name: shared,     mountPath: /shared }
                - { name: shared-mem, mountPath: /dev/shm }
          volumes:
            - name: shared
              persistentVolumeClaim:
                claimName: prime-rl-shared
            - name: shared-mem
              emptyDir: { medium: Memory, sizeLimit: "128Gi" }
